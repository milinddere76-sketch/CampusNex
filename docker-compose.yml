# ============================================================================
# CAMPUSNEX DOCKER ORCHESTRATION (PRODUCTION GRADE MULTI-CONTAINER)
# ============================================================================

version: '3.8'

services:
  # 1. Relational Tier: PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: campusnex_db
    environment:
      POSTGRES_DB: campusnex
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      # Mount sql schemas to initialize and seed the DB automatically on first boot
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
      # Persist DB state
      - pgdata:/var/lib/postgresql/data
    networks:
      - campusnex_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d campusnex"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Application Core: Node.js Express + WebSockets Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campusnex_backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_PASSWORD=postgres
      - PG_DATABASE=campusnex
      - JWT_SECRET=super_secret_campusnex_token_99981
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - campusnex_net

  # 3. SaaS Landing & Admin Portal: Static Nginx Web Server
  saas_portal:
    image: nginx:alpine
    container_name: campusnex_portal
    ports:
      - "8080:80"
    volumes:
      # Mount the static site directories
      - ./saas_portal:/usr/share/nginx/html
    networks:
      - campusnex_net
    restart: always

volumes:
  pgdata:

networks:
  campusnex_net:
    driver: bridge
