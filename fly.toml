# fly.toml app configuration file generated for campusnex on 2026-05-22T17:37:38Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'campusnex'
primary_region = 'bom'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[http_service.concurrency]
  type = "connections"
  hard_limit = 50
  soft_limit = 25

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  path = "/health"
  protocol = "http"
  timeout = "5s"

