# fly.toml app configuration file generated for campusnex on 2026-05-22T17:22:01Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'campusnex'
primary_region = 'bom'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '5000'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
